[concentration]
	#Whether the window size and pos is customized
	customized = false
	#Whether the window pos should related to the monitor
	related = false
	#X coordinate
	# Default: 0
	# Range: > -2147483648
	x = 0
	#Y coordinate
	# Default: 0
	# Range: > -2147483648
	y = 0
	#Width
	# Default: 800
	# Range: > 1
	width = 800
	#Height
	# Default: 600
	# Range: > 1
	height = 600
	#Fullscreen mode
	#Allowed Values: EXCLUSIVE, NATIVE, BORDERLESS
	fullscreen = "NATIVE"
